spring:
  application:
    name: Git2Go

  # ===== DATABASE (AWS RDS) =====
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        ssl: true
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # ===== FLYWAY =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===== REDIS (AWS ElastiCache) =====
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      ssl:
        enabled: true        # ← this line was missing
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ===== GITHUB OAUTH2 =====
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
              - repo
            redirect-uri: "{baseUrl}/login/oauth2/code/github"

# ===== SERVER =====
server:
  port: 8080

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# ===== AWS =====
aws:
  region: ${AWS_REGION:ap-south-1}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  ecr:
    registry-url: ${AWS_ECR_REGISTRY_URL}
  ecs:
    cluster: ${AWS_ECS_CLUSTER:git2go-cluster}
    execution-role-arn: ${AWS_ECS_EXECUTION_ROLE_ARN}
  codebuild:
    project-name: ${AWS_CODEBUILD_PROJECT:git2go-builder}
  s3:
    bucket: ${AWS_S3_BUCKET}

# ===== APP =====
app:
  base-url: ${APP_BASE_URL}
  base-domain: ${APP_BASE_DOMAIN}

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized